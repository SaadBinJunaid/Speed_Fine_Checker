<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Fine Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
    <div class="flex flex-col items-center w-full max-w-md">
        <h1
            class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 to-purple-300 text-center mb-8 tracking-tight motion-safe:animate-pulse cursor-pointer hover:scale-105 hover:drop-shadow-[0_0_20px_rgba(129,140,248,0.6)] transition-all duration-500 ease-out">
            Speed Fine Checker</h1>
        <div id="card"
            class="group bg-white/15 backdrop-blur-xl p-6 rounded-2xl w-full border border-white/20 shadow-2xl shadow-indigo-500/10 hover:shadow-[0_0_50px_rgba(99,102,241,0.3)] hover:scale-[1.02] hover:border-indigo-400/50 transition-all duration-500 ease-out motion-safe:animate-pulse cursor-pointer">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="number" id="SpeedInput" placeholder="Enter speed (km/h)"
                    class="flex-1 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all duration-300 hover:bg-white/[0.15] hover:border-indigo-400/50">
                <button id="SpeedCheckButton"
                    class="px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-semibold shadow-lg shadow-indigo-500/25 hover:shadow-[0_0_35px_rgba(99,102,241,0.5)] transition-all duration-300 active:scale-90 whitespace-nowrap cursor-pointer group-hover:shadow-indigo-500/40">
                    Check
                </button>
            </div>
            <h3 id="result" class="mt-4 text-center text-white/90 font-medium"></h3>
        </div>
    </div>
</body>
<script src="Speed_Fine_Checker.js"></script>
</html>
